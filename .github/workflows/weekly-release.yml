name: Weekly Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub prerelease after the build
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compute release metadata
        id: meta
        run: |
          BASE_TAG="weekly-$(date -u +%G).W$(date -u +%V)"
          TAG="$BASE_TAG"
          INDEX=0

          git fetch --tags --force

          while git rev-parse -q --verify "refs/tags/$TAG" >/dev/null || \
                git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; do
            INDEX=$((INDEX + 1))
            TAG="${BASE_TAG}.${INDEX}"
          done

          echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=HyperZoneLogin $TAG" >> "$GITHUB_OUTPUT"

      - name: Build plugin jars
        run: ./gradlew clean build -PreleaseChannel=WEEKLY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.tag }}-build
          path: build/HZL/*
          if-no-files-found: error
          retention-days: 30

      - name: Create release tag
        if: ${{ inputs.publish_release }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "refs/tags/${{ steps.meta.outputs.tag }}"

      - name: Publish weekly prerelease
        if: ${{ inputs.publish_release }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          artifactErrorsFailBuild: true
          artifacts: |
            build/HZL/*
          body: |
            This is an automatically generated weekly prerelease build for HyperZoneLogin.

            Included artifacts are collected from `build/HZL/`.

            Workflow artifacts are also uploaded to the Actions run for direct download.

            If you encounter issues, please open an Issue and include environment, modules, logs, config snippets, and reproduction steps.
          generateReleaseNotes: true

